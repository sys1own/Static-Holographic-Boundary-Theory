name: SHBT-Parallel-Audit

on: [push, pull_request]

jobs:
  audit-sector:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        sector: [gravity, cosmology, flavor, rigidity]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Bootstrap sector
        run: >-
          python -m pip install
          PyYAML==6.0.3
          Jinja2==3.1.6
          mpmath==1.3.0
          numpy==1.26.4
          scipy==1.12.0
          matplotlib==3.8.3
          sympy==1.12

      - name: Execute Sector Proof
        run: |
          mkdir -p results
          # Point Python to the new src directory
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          # Execute the core engine via the module
          python -m shbt.main --sector ${{ matrix.sector }} --output-dir results/

      - name: Universal Derivation Audit
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          # Run scripts from their new locations
          python scripts/derive_universe.py
          python scripts/derive_lambda.py
          python scripts/derive_proton_ratio.py
          python tests/verify_parity_sink.py
          python tests/moat_stress_tester.py
          python scripts/technological_scaling_limits.py
          python scripts/multimessenger_parity_verifier.py

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.sector }}
          path: results/
