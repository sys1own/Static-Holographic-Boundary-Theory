name: SHBT-Parallel-Audit

on: [push, pull_request]

jobs:
  audit-sector:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        sector: [gravity, cosmology, flavor, rigidity]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Stack
        run: pip install numpy scipy pyyaml mpmath matplotlib jinja2

      - name: Execute Sector Proof
        run: python pub/tn.py --sector ${{ matrix.sector }} --output-dir results/

      - name: Archive Results
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.sector }}
          path: results/
