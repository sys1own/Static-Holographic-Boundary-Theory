name: SHBT-Comprehensive-Audit

on: [push, pull_request]

jobs:
  # Job 1: Parallel Sector Proofs (Computational Heavy Lifting)
  audit-sectors:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sector: [gravity, cosmology, flavor, rigidity]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install PyYAML==6.0.3 Jinja2==3.1.6 mpmath==1.3.0 \
          numpy==1.26.4 scipy==1.12.0 matplotlib==3.8.3 sympy==1.12 \
          pandas==2.2.1 streamlit==1.32.0

      - name: Execute Sector Proof
        run: |
          mkdir -p results
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          # Restored matrix context to fix "expected one argument" error
          python -m shbt.main --sector ${{ matrix.sector }} --output-dir results/

      - name: Upload Sector Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sector-audit-${{ matrix.sector }}
          path: results/

  # Job 2: Universal Proofs & Manuscript Synchronization
  universal-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install PyYAML==6.0.3 Jinja2==3.1.6 mpmath==1.3.0 \
          numpy==1.26.4 scipy==1.12.0 matplotlib==3.8.3 sympy==1.12 \
          pytest==8.1.1 pandas==2.2.1 streamlit==1.32.0

      - name: Generate Residual Ledger
        run: |
          mkdir -p results
          # Added scripts to PYTHONPATH to resolve script-to-script imports
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src:$(pwd)/scripts
          python scripts/export.py

      - name: Formal Rigidity Unit Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/

      - name: Synchronize Manuscript
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python scripts/sync_system.py

      - name: Upload Universal Proof Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: universal-audit-results
          path: results/
