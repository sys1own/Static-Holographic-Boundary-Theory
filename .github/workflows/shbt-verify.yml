name: SHBT-Parallel-Audit

on: [push, pull_request]

jobs:
  audit-sector:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        sector: [gravity, cosmology, flavor, rigidity]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Bootstrap sector
        run: >-
          python -m pip install
          PyYAML==6.0.3
          Jinja2==3.1.6
          mpmath==1.3.0
          numpy==1.26.4
          scipy==1.12.0
          matplotlib==3.8.3
          sympy==1.12

      - name: Execute Sector Proof
        run: |
          mkdir -p results
          python pub/tn.py --sector ${{ matrix.sector }} --output-dir results/

      - name: Universal Derivation Audit
        run: |
          python pub/derive_universe.py
          python pub/derive_lambda.py
          python pub/derive_proton_ratio.py
          python pub/verify_parity_sink.py
          python pub/moat_stress_tester.py

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.sector }}
          path: results/
