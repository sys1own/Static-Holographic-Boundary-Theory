name: SHBT-Universal-Source-Code-Audit

on: [push, pull_request]

jobs:
  # Job 1: Parallel Sector Executions (Verification of Individual Rigidity)
  audit-sectors:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sector: [gravity, cosmology, flavor, rigidity, complexity]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install PyYAML==6.0.3 Jinja2==3.1.6 mpmath==1.3.0 \
          numpy==1.26.4 scipy==1.12.0 matplotlib==3.8.3 sympy==1.12 \
          pandas==2.2.1 streamlit==1.32.0 plotly==5.19.0
      - name: Zero-Parameter Sector Derivation
        run: |
          mkdir -p results
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python -m shbt.main --sector ${{ matrix.sector }} --output-dir results/ --zero-parameter

  # Job 2: Universal Entanglement, Formal Proofs, and Manuscript Generation
  universal-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Logic Audit Dependencies
        run: |
          python -m pip install PyYAML==6.0.3 Jinja2==3.1.6 mpmath==1.3.0 \
          numpy==1.26.4 scipy==1.12.0 matplotlib==3.8.3 sympy==1.12 \
          pytest==9.0.2 pandas==2.2.1 streamlit==1.32.0 plotly==5.19.0 \
          tomli  # Required for pyproject parsing in Python < 3.11
      
      - name: Build SHBT Manuscript Container
        run: |
          docker build -t shbt-manuscript:latest .

      - name: Formal Rigidity & Entropy Unit Tests
        # Runs the 309+ test items to ensure math and infrastructure conform
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/

      - name: Execute Grand Unified Audit (Universal Mode)
        # Runs inside the rigid container environment
        run: |
          docker run --rm -v $(pwd)/results:/app/results shbt-physical-os:latest

      - name: Generate Executable Manuscript
        # Synchronizes the journal paper with verified UV-to-IR data
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python scripts/sync_system.py
          # The PDF is generated by the Tectonic engine inside the build script
          python scripts/build_manuscript.py

      - name: Upload Universal Audit Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: universal-source-code-artifacts
          path: |
            results/
            manuscript.pdf
