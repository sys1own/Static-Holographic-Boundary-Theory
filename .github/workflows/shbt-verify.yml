name: Universal Source Code Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  shbt-verify:
    name: SHBT audit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MPLBACKEND: Agg
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify benchmark integrity
        run: python pub/verify_benchmark_integrity.py

      - name: Install locked audit environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "Jinja2==3.1.6" \
            "mpmath==1.3.0" \
            "PyYAML==6.0.3" \
            "numpy==1.26.4" \
            "scipy==1.12.0" \
            "matplotlib==3.8.3" \
            pytest
          python -m pip check

      - name: Enforce pinned scientific stack
        run: |
          python - <<'PY'
          import importlib.metadata as metadata

          expected_versions = {
              "mpmath": "1.3.0",
              "PyYAML": "6.0.3",
              "numpy": "1.26.4",
              "scipy": "1.12.0",
              "matplotlib": "3.8.3",
          }

          for package_name, expected_version in expected_versions.items():
              installed_version = metadata.version(package_name)
              if installed_version != expected_version:
                  raise SystemExit(
                      f"{package_name} expected {expected_version}, got {installed_version}"
                  )

          print("Pinned scientific stack verified.")
          PY

      - name: Regenerate benchmark artifacts
        run: python tn.py

      - name: Generate local moat topology
        run: python pub/plot_local_moat.py --output-dir results

      - name: Run reviewer trap audit
        run: python -m pytest -q pub/test_anomaly_logic.py

      - name: Standardize residual artifact name
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          results_dir = Path("results")
          source_candidates = (
              results_dir / "benchmark_diagnostics.json",
              results_dir / "final" / "benchmark_diagnostics.json",
          )

          source_path = next((path for path in source_candidates if path.is_file()), None)
          if source_path is None:
              raise SystemExit("Missing benchmark_diagnostics.json after audit regeneration.")

          target_path = results_dir / "residuals.json"
          shutil.copy2(source_path, target_path)
          print(f"Standardized residual artifact at {target_path.as_posix()} from {source_path.as_posix()}")
          PY

      - name: Verify retained artifacts
        run: |
          test -d results
          test -f results/local_moat_topology.png
          test -f results/residuals.json

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shbt-audit-results
          path: results/
          if-no-files-found: error
