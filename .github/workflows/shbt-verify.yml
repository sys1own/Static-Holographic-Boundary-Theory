name: SHBT-Comprehensive-Audit

on: [push, pull_request]

jobs:
  # Job 1: Parallel Sector Proofs (Computational Heavy Lifting)
  audit-sectors:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        sector: [gravity, cosmology, flavor, rigidity]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Core Dependencies
        run: |
          python -m pip install PyYAML==6.0.3 Jinja2==3.1.6 mpmath==1.3.0 \
          numpy==1.26.4 scipy==1.12.0 matplotlib==3.8.3 sympy==1.12

      - name: Execute Sector Proof
        run: |
          mkdir -p results
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python -m shbt.main --sector ${{ matrix.sector }} --output-dir results/

      - name: Upload Sector Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sector-audit-${{ matrix.sector }}
          path: results/

  # Job 2: Universal Proofs & Derivation Ledger (Global Constants)
  universal-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install PyYAML==6.0.3 Jinja2==3.1.6 mpmath==1.3.0 \
          numpy==1.26.4 scipy==1.12.0 matplotlib==3.8.3 sympy==1.12 pytest==8.1.1

      - name: Run Universal Derivation Ledger
        run: |
          mkdir -p results
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python scripts/derive_universe.py
          python scripts/derive_lambda.py
          python scripts/derive_proton_ratio.py

      - name: Run Multi-Messenger & Complexity Audits
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python scripts/multimessenger_parity_verifier.py
          python scripts/technological_scaling_limits.py

      - name: Formal Rigidity Unit Tests
        # Verifies the new temporal and stabilizer kernels
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/

      - name: Upload Universal Results
        uses: actions/upload-artifact@v4
        with:
          name: universal-audit-results
          path: results/
